<!doctype html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CasioEmu Web</title>
<style>
  body { margin: 0; padding: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
  #canvas { width: 100vw; height: 100vh; display: block; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; z-index: 10;
  }
  #loading progress { width: 300px; }
  .file-input { display: none; }
  #toolbar {
    position: absolute; top: 0; left: 0; right: 0; height: 32px;
    background: #222; display: flex; align-items: center; padding: 0 8px;
    gap: 8px; z-index: 5; font-size: 13px;
  }
  #toolbar button {
    background: #444; color: #fff; border: 1px solid #666;
    padding: 2px 10px; cursor: pointer; border-radius: 3px;
  }
  #toolbar button:hover { background: #555; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="loading">
  <h2>CasioEmu Web</h2>
  <progress value="0" max="100" id="progress"></progress>
  <p id="status">Downloading...</p>
</div>

<div id="toolbar" class="hidden">
  <button onclick="CasioEmuBridge.uploadFile()">📂 Open ROM</button>
  <button onclick="CasioEmuBridge.uploadFolder()">📁 Open Folder</button>
  <button onclick="CasioEmuBridge.downloadState()">💾 Save State</button>
  <button onclick="CasioEmuBridge.screenshot()">📸 Screenshot</button>
  <span style="flex:1"></span>
  <button onclick="CasioEmuBridge.toggleFullscreen()">⛶ Fullscreen</button>
</div>

<input type="file" id="file-input" class="file-input" />
<input type="file" id="folder-input" class="file-input" webkitdirectory directory />

<canvas id="canvas"></canvas>

{{{ SCRIPT }}}

<script>
// Bridge between JS and Emscripten
const CasioEmuBridge = {
  uploadFile: function() {
    const input = document.getElementById('file-input');
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const data = new Uint8Array(ev.target.result);
        const path = '/working/' + file.name;
        FS.writeFile(path, data);
        if (Module._onFileSelected) {
          const strPtr = allocateUTF8(path);
          Module._onFileSelected(strPtr);
          Module._free(strPtr);
        }
      };
      reader.readAsArrayBuffer(file);
    };
    input.click();
  },

  uploadFolder: function() {
    const input = document.getElementById('folder-input');
    input.onchange = (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      const baseDir = '/working/roms/' + (files[0].webkitRelativePath.split('/')[0] || 'rom');
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const data = new Uint8Array(ev.target.result);
          const relPath = file.webkitRelativePath || file.name;
          const fullPath = baseDir + '/' + relPath;
          const dir = fullPath.substring(0, fullPath.lastIndexOf('/'));
          FS.mkdirTree(dir);
          FS.writeFile(fullPath, data);
        };
        reader.readAsArrayBuffer(file);
      });
      alert('Folder loaded to ' + baseDir);
    };
    input.click();
  },

  downloadFile: function(filename, data) {
    const blob = new Blob([data]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  },

  downloadState: function() {
    try {
      FS.syncfs(false, (err) => {
        if (err) console.error('Sync error:', err);
      });
      alert('State synced to browser storage');
    } catch(e) { console.error(e); }
  },

  screenshot: function() {
    const canvas = document.getElementById('canvas');
    const link = document.createElement('a');
    link.download = 'casioemu-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  },

  toggleFullscreen: function() {
    const canvas = document.getElementById('canvas');
    if (!document.fullscreenElement) canvas.requestFullscreen();
    else document.exitFullscreen();
  },

  vibrate: function(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }
};

window.CasioEmuBridge = CasioEmuBridge;

// Progress tracking
var Module = {
  canvas: document.getElementById('canvas'),
  setStatus: function(text) {
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    if (status) status.textContent = text;
    if (text && text.indexOf('Running') !== -1) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('toolbar').classList.remove('hidden');
    }
  },
  totalDependencies: 0,
  monitorRunDependencies: function(left) {
    this.totalDependencies = Math.max(this.totalDependencies, left);
    const progress = document.getElementById('progress');
    if (progress) progress.value = ((this.totalDependencies - left) / this.totalDependencies) * 100;
  },
  onRuntimeInitialized: function() {
    console.log('CasioEmu initialized');
  }
};
</script>
</body>
</html>
